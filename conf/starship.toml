"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](red)\
$os\
$username\
[](bg:peach fg:red)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
[](fg:yellow bg:green)\
[](fg:green bg:sapphire)\
[](fg:sapphire bg:lavender)\
[ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
NixOS = ""

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "~/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]  # Git 分支
style = "bg:yellow"
format = "[$branch(:$remote_branch)]($style)"
symbol = "[](bold green)"         # 分支符号
truncation_symbol = "…"
truncation_length = 11             # 分支名超过 11 字符截断
ignore_branches = ["main", "master"] # 忽略主分支
only_attached = true               # detached HEAD 时不显示

[git_metrics]  # Git 增删统计
style = "bg:yellow"
format = '([ +$added]($added_style))([ -$deleted]($deleted_style))'
added_style = 'bg:yellow'   # 新增：绿色上箭头
deleted_style = 'bg:yellow'   # 删除：红色下箭头
ignore_submodules = true
disabled = false

[git_status]  # Git 状态
style = "bg:yellow"
format = "([$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed]($style))"
# 各状态图标（带数字）
conflicted = "[ ${count}](bg:yellow)"     # 冲突：警告三角 + 数量
ahead = "[ ${count}](bg:yellow)"        # 领先：上箭头 + 数量
behind = "[ ${count}](bg:yellow)"         # 落后：下箭头 + 数量
diverged = "[ ${ahead_count}/${behind_count}](bg:yellow)" # 分歧
untracked = "[ ${count}](bg:yellow)"   # 未跟踪 + 数量
stashed = "[ ${count}](bg:yellow)"      # 暂存 + 数量
modified = "[ ${count} ](bg:yellow)"    # 修改 + 数量
staged = "[ ${count}](bg:yellow)"       # 已暂存 + 数量
renamed = "[󰑕 ${count}](bg:yellow)"       # 重命名 + 数量
deleted = "[ ${count}](bg:yellow)"        # 删除 + 数量


[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

