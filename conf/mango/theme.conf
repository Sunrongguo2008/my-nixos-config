# ╔══════════════════════════════════════════════════════════════╗
# ║                  theme.conf                                  ║
# ║  颜色 · 边框 · 圆角 · 透明度 · 模糊 · 阴影 · 动画 · 光标        ║
# ╚══════════════════════════════════════════════════════════════╝
#
#  ⚠ 注意：值行不能有行内注释，所有注释单独成行
#  颜色格式：0xRRGGBBAA（AA=不透明度，ff=完全不透明）
#  配色方案：Catppuccin Mocha


# ═══════════════════════════════════════════════════════════════
# §1  颜色
# ═══════════════════════════════════════════════════════════════

# 桌面根窗口背景色 - Catppuccin Mocha Base
rootcolor=0x1e1e2eff

# 聚焦窗口边框 - Catppuccin Blue
#focuscolor=0x89b4faff

# 非聚焦窗口边框 - Catppuccin Surface0
#bordercolor=0x313244ff

# 紧急状态边框 - Catppuccin Red
#urgentcolor=0xf38ba8ff

# 最大化窗口边框 - Catppuccin Green
maximizescreencolor=0xa6e3a1ff

# Scratchpad 浮动窗口边框 - Catppuccin Sky
scratchpadcolor=0x89dcebff

# 全局置顶窗口边框 - Catppuccin Mauve
globalcolor=0xcba6f7ff

# Overlay 窗口边框 - Catppuccin Peach
overlaycolor=0xfab387ff


# ═══════════════════════════════════════════════════════════════
# §2  边框 & 圆角
# ═══════════════════════════════════════════════════════════════

# 边框宽度（像素）
borderpx=2

# 窗口圆角半径（像素）
border_radius=10

# 单窗口时也保持圆角（0=保持，1=强制关闭）
no_radius_when_single=0

# 单窗口时是否隐藏边框
no_border_when_single=0


# ═══════════════════════════════════════════════════════════════
# §3  透明度
# ═══════════════════════════════════════════════════════════════

# 聚焦窗口：完全不透明
focused_opacity=1.0

# 非聚焦窗口：轻微透明，突出焦点
unfocused_opacity=0.8


# ═══════════════════════════════════════════════════════════════
# §4  模糊效果
# ═══════════════════════════════════════════════════════════════


# 开启窗口模糊
blur=1

# 开启 Layer surface 模糊（DankMaterialShell 面板背景）
blur_layer=0

# 优化模式：以壁纸为模糊背景，大幅降低 GPU 使用率
blur_optimized=1

# 模糊半径（5=轻柔, 8=标准, 15+=强烈）
blur_params_radius=8

# 模糊通道数（1=快速, 2=平滑）
blur_params_num_passes=2

# 模糊区域亮度（<1.0 略暗，营造深度感）
blur_params_brightness=0.9

# 模糊区域对比度
blur_params_contrast=0.90

# 模糊区域饱和度（>1.0 更鲜艳）
blur_params_saturation=1.10

# 轻微噪点，减少纯色模糊的"塑料感"
blur_params_noise=0.02


# ═══════════════════════════════════════════════════════════════
# §5  阴影
# ═══════════════════════════════════════════════════════════════

# 开启阴影
shadows=1

# DankMaterialShell layer 不需要额外阴影
layer_shadows=0

# 仅浮动窗口有阴影
shadow_only_floating=1

shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=3

# 阴影颜色（黑色，透明度约 53%）
shadowscolor=0x00000088


# ═══════════════════════════════════════════════════════════════
# §6  动画
# ═══════════════════════════════════════════════════════════════
#
#  开/关窗均使用 zoom（类 macOS / niri 缩放风格），速度约 350ms
#

animations=1
layer_animations=1

# 窗口动画类型（可选：zoom, slide, fade, none）
animation_type_open=zoom
animation_type_close=zoom

# DankMaterialShell 面板从屏幕边缘滑入
layer_animation_type_open=slide
layer_animation_type_close=slide

# 淡入淡出
animation_fade_in=1
animation_fade_out=1

# 开窗从完全不透明开始淡入
fadein_begin_opacity=1.0

# 关窗从 60% 不透明度开始淡出
fadeout_begin_opacity=0.6

# Zoom：从 85% 缩放弹出到 100%
zoom_initial_ratio=0.85
zoom_end_ratio=1.0

# 各阶段时长（毫秒）
animation_duration_open=350
animation_duration_close=280
animation_duration_move=350
animation_duration_tag=300
animation_duration_focus=150

# Bezier 曲线（格式：x1,y1,x2,y2）
# 开窗/移动：弹性曲线（ease-out-back 风格）
animation_curve_open=0.22,1.0,0.36,1.0
animation_curve_move=0.22,1.0,0.36,1.0

# 关窗：ease-in-out，平滑消失
animation_curve_close=0.4,0.0,0.6,1.0

# Tag 切换：标准 ease-out
animation_curve_tag=0.46,1.0,0.29,0.99

# 焦点透明度过渡：线性
animation_curve_focus=0.4,0.0,0.6,1.0

animation_curve_opafadein=0.22,1.0,0.36,1.0
animation_curve_opafadeout=0.5,0.5,0.5,0.5

# Tag 切换动画方向（1=水平，与 scroller 横向一致）
tag_animation_direction=1


# ═══════════════════════════════════════════════════════════════
# §7  光标
# ═══════════════════════════════════════════════════════════════

cursor_theme=Bibata-Modern-Ice
cursor_size=24
