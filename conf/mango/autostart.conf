# ╔══════════════════════════════════════════════════════════════╗
# ║                autostart.conf                                ║
# ║  自动启动程序 & 环境变量                                        ║
# ║                                                              ║
# ║  exec-once  → 仅在 mango 启动时执行一次                         ║
# ║  exec       → 每次 reload_config 时都重新执行                   ║
# ║  env        → 在 WM 初始化前设置，reload 时会被重置              ║
# ╚══════════════════════════════════════════════════════════════╝


# ═══════════════════════════════════════════════════════════════
# §1  环境变量
# ═══════════════════════════════════════════════════════════════

# ── 光标 ─────────────────────────────────────────────────────────
#env=XCURSOR_THEME,Bibata-Modern-Ice
#env=XCURSOR_SIZE,28

# ── Wayland 原生支持 ──────────────────────────────────────────────
#env=MOZ_ENABLE_WAYLAND,1                  
# Firefox 原生 Wayland 渲染

#env=ELECTRON_OZONE_PLATFORM_HINT,auto     
# VSCode / Obsidian 等 Electron 应用

#env=QT_QPA_PLATFORM,wayland               
# Qt 应用使用 Wayland 后端

#env=QT_AUTO_SCREEN_SCALE_FACTOR,1         
# Qt 自动缩放（跟随显示器 DPI）

#env=GDK_BACKEND,wayland,x11              
# GTK 优先 Wayland，回退 X11

#env=SDL_VIDEODRIVER,wayland               
# SDL2 游戏/应用 Wayland 后端

# ── XDG 桌面标识（Portal 需要）────────────────────────────────────
# mango 会自动设置 XDG_CURRENT_DESKTOP，一般不需要手动指定
# env=XDG_CURRENT_DESKTOP,mango


# ═══════════════════════════════════════════════════════════════
# §2  核心桌面环境
# ═══════════════════════════════════════════════════════════════

# ── quickshell ───────────────────────────────
# 主桌面 Shell，提供顶栏、Overview、Spotlight 等功能
# 在 mango 完全初始化后启动，避免 layer 注册失败

exec-once=noctalia-shell

# ─────────────────────────────────────────────────────────────────
# 如果 quickshell 启动后 Spotlight 无法响应 dms ipc 调用，
# 可以尝试加延迟：
#   exec-once=bash -c 'sleep 1 && quickshell'
# ─────────────────────────────────────────────────────────────────


# ═══════════════════════════════════════════════════════════════
# §3  系统服务（按需取消注释）
# ═══════════════════════════════════════════════════════════════

# ── XDG Desktop Portal（截图、文件选择、屏幕共享）──────────────────
# 如果 /etc/xdg/mango-portals.conf 已配置，通常会自动启动
# 手动启动时取消下方注释：
# exec-once=/usr/lib/xdg-desktop-portal-wlr &
# exec-once=/usr/lib/xdg-desktop-portal-gtk &

# ── 剪贴板管理 ────────────────────────────────────────────────────
# 需要安装：wl-clipboard, cliphist, wl-clip-persist
# exec-once=wl-clip-persist --clipboard regular --reconnect-tries 0
# exec-once=wl-paste --type text --watch cliphist store

# ── 夜间色温 / 护眼模式 ───────────────────────────────────────────
# exec-once=wlsunset -l 39.9 -L 116.4   # 替换为你的经纬度

# ── 策略代理（polkit）─────────────────────────────────────────────
# exec-once=/usr/lib/xfce-polkit/xfce-polkit

# ── 蓝牙托盘 ─────────────────────────────────────────────────────
# exec-once=blueman-applet

# ── 输入法 ───────────────────────────────────────────────────────
#env=GTK_IM_MODULE,fcitx
#env=QT_IM_MODULE,fcitx
#env=QT_IM_MODULES,wayland;fcitx
#env=SDL_IM_MODULE,fcitx
#env=XMODIFIERS,@im=fcitx
#env=GLFW_IM_MODULE,ibus