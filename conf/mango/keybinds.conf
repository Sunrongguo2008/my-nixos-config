# ╔══════════════════════════════════════════════════════════════╗
# ║                  keybinds.conf                               ║
# ║  所有快捷键 · 鼠标绑定 · 触摸板手势 · 轴绑定                    ║
# ║                                                              ║
# ║  格式：bind[flags]=MODIFIER,KEY,COMMAND,PARAMS               ║
# ║  ⚠ 值行不能有行内注释                                          ║
# ╚══════════════════════════════════════════════════════════════╝


# ═══════════════════════════════════════════════════════════════
# §1  核心窗口管理
# ═══════════════════════════════════════════════════════════════

# 关闭当前窗口
bind=SUPER,Q,killclient

# 切换浮动/平铺状态
bind=SUPER,V,togglefloating

# 真全屏（隐藏 Bar）
bind=SUPER,F,togglefullscreen

# 最大化（保留 Bar 和边框）
bind=SUPER+SHIFT,F,togglemaximizescreen

# 居中当前浮动窗口
bind=SUPER,C,centerwin

# 最小化到 Scratchpad 池
bind=SUPER,M,minimized

# 从 Scratchpad 池恢复
bind=SUPER+SHIFT,M,restore_minimized


# ═══════════════════════════════════════════════════════════════
# §2  启动应用
# ═══════════════════════════════════════════════════════════════


bind=SUPER,Return,spawn,kitty
bind=SUPER,E,spawn,nautilus
bind=SUPER,Space,spawn_shell,dms ipc call spotlight toggle
bind=SUPER,B,spawn,flatpak run --branch=stable --arch=x86_64 --command=launch-script.sh --file-forwarding app.zen_browser.zen

# 截图选区（需安装 grim + slurp + wl-clipboard）
bind=SUPER+SHIFT,S,spawn_shell,grim -g "$(slurp)" - | wl-copy

# 截图全屏保存
bind=SUPER+SHIFT+CTRL,S,spawn_shell,grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png


# ═══════════════════════════════════════════════════════════════
# §3  焦点移动（niri 风格：SUPER + 方向键 / Vim hjkl）
# ═══════════════════════════════════════════════════════════════

# 方向键
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down

# Vim 风格
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# 切回上一个聚焦的窗口
bind=SUPER,BackSpace,focuslast


# ═══════════════════════════════════════════════════════════════
# §4  窗口移动 / 交换（SUPER+SHIFT + 方向）
# ═══════════════════════════════════════════════════════════════

bind=SUPER+SHIFT,left,exchange_client,left
bind=SUPER+SHIFT,right,exchange_client,right
bind=SUPER+SHIFT,up,exchange_client,up
bind=SUPER+SHIFT,down,exchange_client,down

bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# 将当前窗口与 Master 主区互换位置（tile 布局）
bind=SUPER+SHIFT,Return,zoom


# ═══════════════════════════════════════════════════════════════
# §5  Scroller 专属操作（niri 核心体验）
# ═══════════════════════════════════════════════════════════════

# 循环切换窗口宽度预设（0.5 → 0.75 → 1.0 → ...）
bind=SUPER+SHIFT+E,switch_proportion_preset

# 微调当前窗口宽度（5% 步进）
bind=SUPER+CTRL,right,set_proportion,+0.05
bind=SUPER+CTRL,left,set_proportion,-0.05
bind=SUPER+CTRL,l,set_proportion,+0.05
bind=SUPER+CTRL,h,set_proportion,-0.05

# 将窗口移入/移出 Scroller Stack（列内堆叠）
bind=SUPER+SHIFT,bracketleft,scroller_stack,left
bind=SUPER+SHIFT,bracketright,scroller_stack,right


# ═══════════════════════════════════════════════════════════════
# §6  Tag 切换（工作区）
# ═══════════════════════════════════════════════════════════════

# SUPER + 数字 → 切换到对应 Tag
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# 相邻 Tag 左右切换（niri 横向工作区体验）
bind=SUPER,bracketleft,viewtoleft_have_client
bind=SUPER,bracketright,viewtoright_have_client

# 切回上一个 Tag（SUPER + ` 反引号）
bind=SUPER,grave,view,-1

# 查看所有 Tag 叠加视图
bind=SUPER,0,view,0


# ═══════════════════════════════════════════════════════════════
# §7  将窗口移动到 Tag
# ═══════════════════════════════════════════════════════════════

# SUPER+SHIFT + 数字 → 移动窗口到 Tag 并跟随过去
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# SUPER+ALT + 数字 → 静默移动（不跟随）
bind=SUPER+ALT,1,tagsilent,1
bind=SUPER+ALT,2,tagsilent,2
bind=SUPER+ALT,3,tagsilent,3
bind=SUPER+ALT,4,tagsilent,4
bind=SUPER+ALT,5,tagsilent,5

# 将窗口移到相邻 Tag
bind=SUPER+SHIFT,bracketleft,tagtoleft
bind=SUPER+SHIFT,bracketright,tagtoright


# ═══════════════════════════════════════════════════════════════
# §8  布局切换
# ═══════════════════════════════════════════════════════════════

bind=SUPER+CTRL,s,setlayout,scroller
#bind=SUPER+CTRL,t,setlayout,tile
#bind=SUPER+CTRL,m,setlayout,monocle
#bind=SUPER+CTRL,g,setlayout,grid
#bind=SUPER+CTRL,d,setlayout,deck

# 循环切换布局
#bind=SUPER+CTRL,n,switch_layout

# 调整主区占比（tile 布局，5% 步进）
bind=SUPER+ALT,h,setmfact,-0.05
bind=SUPER+ALT,l,setmfact,+0.05
bind=SUPER+ALT,left,setmfact,-0.05
bind=SUPER+ALT,right,setmfact,+0.05


# ═══════════════════════════════════════════════════════════════
# §9  间距控制
# ═══════════════════════════════════════════════════════════════

bind=SUPER+CTRL,equal,incgaps,+2
bind=SUPER+CTRL,minus,incgaps,-2

# 切换间距开/关
bind=SUPER+CTRL,0,togglegaps


# ═══════════════════════════════════════════════════════════════
# §10  Overview 总览（类 niri 工作区概览）
# ═══════════════════════════════════════════════════════════════

bind=SUPER,Tab,toggleoverview


# ═══════════════════════════════════════════════════════════════
# §11  浮动窗口精细控制
# ═══════════════════════════════════════════════════════════════

# 吸附移动
bind=SUPER+ALT,left,smartmovewin,left
bind=SUPER+ALT,right,smartmovewin,right
bind=SUPER+ALT,up,smartmovewin,up
bind=SUPER+ALT,down,smartmovewin,down

# 精确像素移动（10px）
bind=SUPER+CTRL+ALT,left,movewin,-10,0
bind=SUPER+CTRL+ALT,right,movewin,10,0
bind=SUPER+CTRL+ALT,up,movewin,0,-10
bind=SUPER+CTRL+ALT,down,movewin,0,10

# 吸附缩放
bind=SUPER+SHIFT+ALT,left,smartresizewin,left
bind=SUPER+SHIFT+ALT,right,smartresizewin,right
bind=SUPER+SHIFT+ALT,up,smartresizewin,up
bind=SUPER+SHIFT+ALT,down,smartresizewin,down


# ═══════════════════════════════════════════════════════════════
# §12  系统控制
# ═══════════════════════════════════════════════════════════════

# 热重载配置（无需重启）
bind=SUPER+SHIFT,R,reload_config

# 退出 mangowm
bind=SUPER+SHIFT+CTRL,M,quit

# 锁屏（取消注释并替换为你的锁屏工具）
# bindl=SUPER+CTRL,L,spawn,swaylock


# ═══════════════════════════════════════════════════════════════
# §13  媒体控制
# ═══════════════════════════════════════════════════════════════
# ⚠ 若媒体键无响应，用 wev 确认实际 key name

# 亮度（需安装 brightnessctl）
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 5%-
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

# 音量（需安装 wireplumber / wpctl）
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# 播放控制（取消注释，需安装 playerctl）
# bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
# bind=NONE,XF86AudioNext,spawn,playerctl next
# bind=NONE,XF86AudioPrev,spawn,playerctl previous


# ═══════════════════════════════════════════════════════════════
# §14  鼠标绑定
# ═══════════════════════════════════════════════════════════════

# SUPER + 左键拖拽 → 移动窗口
mousebind=SUPER,btn_left,moveresize,curmove

# SUPER + 右键拖拽 → 缩放窗口
mousebind=SUPER,btn_right,moveresize,curresize

# Overview 模式下的鼠标操作
# ⚠ NONE 修饰键只有 btn_middle 通用；btn_left/btn_right 在 Overview 模式下有效
# 部分版本不支持 NONE + btn_left/right，如报错请注释掉这两行
mousebind=SUPER,btn_middle,toggleoverview


# ═══════════════════════════════════════════════════════════════
# §15  滚轴绑定（SUPER + 滚轮切换 Tag）
# ═══════════════════════════════════════════════════════════════

# SUPER + 向上滚 → 上一个 Tag
axisbind=SUPER,UP,viewtoleft_have_client

# SUPER + 向下滚 → 下一个 Tag
axisbind=SUPER,DOWN,viewtoright_have_client


# ═══════════════════════════════════════════════════════════════
# §16  触摸板手势
# ═══════════════════════════════════════════════════════════════

# 3 指横向/纵向 → 窗口焦点方向移动
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

# 4 指横向 → 相邻 Tag 切换（niri 工作区滑动体验）
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client

# 4 指上/下 → 进入/退出 Overview（类 macOS Mission Control）
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
