# ╔══════════════════════════════════════════════════════════════╗
# ║                   rules.conf                                 ║
# ║  窗口规则 · Tag 规则 · Layer 规则                              ║
# ║                                                              ║
# ║  windowrule → 针对具体应用窗口                                  ║
# ║  tagrule    → 为每个 Tag（工作区）设置默认布局等                  ║
# ║  layerrule  → 针对 Layer Shell surface（Bar/通知/Launcher）    ║
# ╚══════════════════════════════════════════════════════════════╝


# ═══════════════════════════════════════════════════════════════
# §1  Tag 规则（工作区布局分配）
# ═══════════════════════════════════════════════════════════════
#
#  规划（参考 niri 工作区设计）：
#    Tag 1-3  → Scroller（日常：浏览器、编辑器、终端）
#    Tag 4-5  → Tile（分屏工作：代码 + 终端）
#    Tag 6    → Monocle（专注模式：视频、文档）
#    Tag 7-9  → 自由，不强制布局
#
#  no_hide:1 → 即使 Tag 为空也保持显示（DankMaterialShell 的 Tag 指示器需要）
#

tagrule=id:1,no_hide:1,layout_name:scroller
tagrule=id:2,no_hide:1,layout_name:scroller
tagrule=id:3,no_hide:1,layout_name:scroller
tagrule=id:4,no_hide:1,layout_name:scroller
#tagrule=id:5,layout_name:tile
#tagrule=id:6,layout_name:monocle


# ═══════════════════════════════════════════════════════════════
# §2  Layer 规则（DankMaterialShell & Launcher）
# ═══════════════════════════════════════════════════════════════
#
#  ★ 如何确认 layer name：
#     启动 quickshell 后，执行 `mmsg -e` 查看最后聚焦的 layer 名称
#     将下方的 "quickshell.*" 替换为实际名称
#
#  DankMaterialShell 的各组件可能使用不同 layer name，
#  通常格式为 "quickshell" 或带有组件标识的前缀
#

# DankMaterialShell 主 Shell：slide 动画（从屏幕边缘滑入）
# 正则匹配以 "dms" 开头的所有 layer
layerrule=animation_type_open:slide,animation_type_close:zoom,noanim:1,noblur:1,noshadow:1,layer_name:dms*

# ── 截图选区工具（重要！）──────────────────────────────────────────
# slurp 等选区工具需要禁用动画和模糊，否则截图区域会有残影/遮挡
layerrule=noanim:1,noblur:1,noshadow:1,layer_name:selection
layerrule=noanim:1,noblur:1,noshadow:1,layer_name:slurp

# ── 通知层（如有独立通知 Layer）──────────────────────────────────
# layerrule=noanim:1,noshadow:1,layer_name:notifications


# ═══════════════════════════════════════════════════════════════
# §3  窗口规则 - 通用行为
# ═══════════════════════════════════════════════════════════════

# ── 终端：启用窗口吞并（isterm）──────────────────────────────────
# 从 kitty 启动 GUI 程序时，GUI 窗口会"吞并"终端（视觉上替换）
#windowrule=isterm:1,appid:kitty

# ── 常见对话框：强制浮动 ──────────────────────────────────────────
# 使用正则匹配常见的对话框/设置窗口标题
windowrule=isfloating:1,title:(?i)(preferences|设置|open file|save file|另存为|about|关于|properties|properties)

# ── 系统设置类应用：浮动并居中 ────────────────────────────────────
windowrule=isfloating:1,width:900,height:650,appid:gnome-control-center
windowrule=isfloating:1,width:900,height:650,appid:pavucontrol
windowrule=isfloating:1,width:800,height:600,appid:nm-connection-editor

# ── 图片/媒体查看器：浮动显示 ────────────────────────────────────
windowrule=isfloating:1,width:1200,height:800,appid:imv
windowrule=isfloating:1,width:1200,height:800,appid:eog
windowrule=isfloating:1,width:1200,height:800,appid:gwenview


# ═══════════════════════════════════════════════════════════════
# §4  窗口规则 - 视觉效果覆盖
# ═══════════════════════════════════════════════════════════════

# ── 截图/选区工具：禁用模糊（避免截图效果异常）──────────────────
windowrule=noblur:1,appid:slurp
windowrule=noblur:1,appid:grim

# ── 画面全透明的应用：禁用模糊（避免双重模糊）───────────────────
# windowrule=noblur:1,appid:rofi


# ═══════════════════════════════════════════════════════════════
# §5  窗口规则 - Tag/显示器分配
# ═══════════════════════════════════════════════════════════════

# 示例：Discord/Telegram 静默打开到 Tag 9
# windowrule=tags:9,isopensilent:1,appid:discord
# windowrule=tags:9,isopensilent:1,appid:org.telegram.desktop

# 示例：将特定应用发送到副显示器（替换 HDMI-A-1 为实际名称）
# windowrule=monitor:HDMI-A-1,appid:discord


# ═══════════════════════════════════════════════════════════════
# §6  窗口规则 - 游戏优化（当前已关闭 Tearing，预留配置）
# ═══════════════════════════════════════════════════════════════
#
#  如需为特定游戏开启 Tearing，先在 config.conf 设置 allow_tearing=1，
#  再在此处添加对应的 windowrule：
#
# windowrule=force_tearing:1,title:Counter-Strike 2
# windowrule=force_tearing:1,title:Cyberpunk 2077
