# ╔══════════════════════════════════════════════════════════════╗
# ║              mangowm 主配置文件  (config.conf)               ║
# ║                                                              ║
# ║  结构：                                                       ║
# ║    config.conf   ← 你在这里（入口、系统、布局、焦点行为）         ║
# ║    autostart.conf ← 自动启动程序 & 环境变量                     ║
# ║    theme.conf     ← 颜色、边框、模糊、阴影、动画               ║
# ║    keybinds.conf  ← 所有快捷键 & 鼠标手势                     ║
# ║    rules.conf     ← 窗口规则 / Tag 规则 / Layer 规则           ║
# ╚══════════════════════════════════════════════════════════════╝

# ── 子配置导入（顺序：启动 → 主题 → 键绑 → 规则）─────────────────
source=~/.config/mango/autostart.conf
source=~/.config/mango/theme.conf
source=~/.config/mango/keybinds.conf
source=~/.config/mango/rules.conf


# ═══════════════════════════════════════════════════════════════
# §1  系统 & 硬件
# ═══════════════════════════════════════════════════════════════

# 保持 XWayland 常驻，避免第一次打开 X11 程序时的启动延迟
xwayland_persistence=1

# 启用 DRM syncobj timeline 支持，改善游戏/视频的帧同步卡顿
# ⚠ 需要重启 mango 生效；部分显卡不兼容（如出现崩溃请关闭）
syncobj_enable=1

# 不允许客户端请求全局 Tearing（游戏如需开启见 rules.conf）
allow_tearing=0


# ═══════════════════════════════════════════════════════════════
# §2  输入设备
# ═══════════════════════════════════════════════════════════════

# ── 键盘 ────────────────────────────────────────────────────────
xkb_rules_layout=us
# xkb_rules_options=      # 如需重映射按键，取消注释并填写
#   常用选项示例：
#     caps:escape          → Caps Lock 映射为 Esc
#     ctrl:nocaps          → Caps Lock 映射为 Ctrl
#     grp:win_switch       → Super 切换布局

repeat_rate=30
repeat_delay=280
numlockon=0

# ── 触摸板 ───────────────────────────────────────────────────────
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
scroll_method=1
click_method=1
middle_button_emulation=0

# ── 鼠标 ─────────────────────────────────────────────────────────
mouse_natural_scrolling=0 
accel_profile=2
accel_speed=0.0


# ═══════════════════════════════════════════════════════════════
# §3  布局：Scroller（niri / PaperWM 风格横向滚动）
# ═══════════════════════════════════════════════════════════════
#
#  核心体验目标（对齐 niri）：
#    ✓ 窗口在横向轨道上排列，不覆盖其他窗口
#    ✓ 聚焦窗口始终居中显示
#    ✓ 宽度可按预设比例一键切换
#

# 新窗口默认宽度 = 屏幕宽度的 80%
scroller_default_proportion=0.6

# 聚焦窗口始终居中（niri 核心体验）
# 优先级顺序：overspread > focus_center > prefer_center
# 要让 focus_center 生效，必须把更高优先级的选项关闭
scroller_prefer_overspread=0
scroller_focus_center=0
scroller_prefer_center=1

# 单窗口时全宽铺满（不受比例约束）
scroller_ignore_proportion_single=1

# 按键循环切换宽度预设：窄 → 中 → 全屏
scroller_proportion_preset=0.5,0.75,1.0

# 窗口部分移出屏幕边缘时，鼠标仍可聚焦
edge_scroller_pointer_focus=1

# 两侧保留的结构宽度（窗口比例为 1.0 时两侧留白）
scroller_structs=20

# ── Master-Stack 布局备用设置（tile / center_tile 等）─────────────
new_is_master=1
default_mfact=0.55
default_nmaster=1

# 单窗口时禁用间距（视觉更整洁，与 niri 单窗口全铺一致）
smartgaps=1


# ═══════════════════════════════════════════════════════════════
# §4  间距
# ═══════════════════════════════════════════════════════════════

gappih=6
gappiv=6
gappoh=12
gappov=12


# ═══════════════════════════════════════════════════════════════
# §5  焦点 & 鼠标行为
# ═══════════════════════════════════════════════════════════════

# 鼠标进入窗口即自动聚焦（sloppy focus）
sloppyfocus=1

# 键盘切换焦点时，光标自动跳到新窗口中心
# （与 scroller 居中逻辑配合，保持鼠标和焦点一致）
warpcursor=1

# 应用请求激活时自动聚焦（如终端打开 URL 后浏览器弹出）
focus_on_activate=1

# 静止 5 秒后隐藏光标（演示/全屏时有用）
cursor_hide_timeout=5

# 允许拖拽平铺窗口互换位置
drag_tile_to_tile=1
drag_corner=3


# ═══════════════════════════════════════════════════════════════
# §6  Overview 总览模式（类 niri 工作区概览）
# ═══════════════════════════════════════════════════════════════

# 热区触发：鼠标移到左上角自动进入 Overview
enable_hotarea=1
hotarea_corner=0
hotarea_size=10

# Overview 布局间距
overviewgappi=5
overviewgappo=30

# 禁用 Tab 循环模式（避免与 DankMaterialShell 快捷键冲突）
ov_tab_mode=0


# ═══════════════════════════════════════════════════════════════
# §7  多显示器 & 杂项
# ═══════════════════════════════════════════════════════════════

# 方向键焦点不跨显示器（避免意外跳显示器）
focus_cross_monitor=0

# 不允许焦点跨 Tag（保持 scroller 横向滚动在当前 Tag 内）
focus_cross_tag=0

# 当前 Tag 再次按下时，切回上一个 Tag
view_current_to_back=1

# 每次只显示一个 Scratchpad（避免堆叠混乱）
single_scratchpad=1

# 快捷键抑制（允许游戏/RDP 客户端捕获按键）
allow_shortcuts_inhibit=1
source = ./dms/binds.conf
source = ./dms/colors.conf
source = ./dms/layout.conf

# This sources the noctalia theme

source = /home/s/.config/mango/noctalia.conf

